<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>カウントダウンタイマー</title>
  </head>
  <body>
    <main>
      <div id="timer">
        <input id="hours" type="number" min="0" value="00" />:
        <input id="minutes" type="number" min="0" value="00" />:
        <input id="seconds" type="number" min="0" value="00" />
      </div>

      <div id="buttons">
        <div id="hours-btn">
          <button id="hours-up">▲</button>
          <button id="hours-down">▼</button>
        </div>
        <div id="minutes-btn">
          <button id="minutes-up">▲</button>
          <button id="minutes-down">▼</button>
        </div>
        <div id="seconds-btn">
          <button id="seconds-up">▲</button>
          <button id="seconds-down">▼</button>
        </div>
      </div>

      <button id="start">Start</button>
      <div class="btn">
        <button id="stop">Stop</button>
        <button id="reset">Reset</button>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
